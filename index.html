<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IM_CHAT // 3036_FEED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020202; color: #00f2ff; font-family: 'Courier New', monospace; }
        .holo-border { border: 1px solid #00f2ff; box-shadow: 0 0 15px #00f2ff33; }
        .glitch { text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; }
    </style>
</head>
<body class="h-screen flex flex-col p-4">
    <header class="flex justify-between items-center mb-4 border-b border-cyan-900 pb-2">
        <h1 class="glitch font-bold tracking-tighter">IMAGE_CHAT_OS</h1>
        <span class="text-[10px] opacity-50">SYNC_STATUS: STABLE</span>
    </header>

    <main class="flex-1 overflow-y-auto holo-border rounded p-4 space-y-4 custom-scrollbar" id="feed">
        <div class="text-xs text-cyan-700">// LOG_INIT: ENCRYPTED_CHANNEL_OPEN</div>
    </main>

    <footer class="mt-4 flex gap-2">
        <label class="holo-border px-4 py-2 cursor-pointer hover:bg-cyan-950 transition">
            <input type="file" id="img-up" class="hidden" accept="image/*"> [UP]
        </label>
        <input type="text" id="msg" placeholder="Transmit thought..." class="flex-1 bg-transparent holo-border px-4 py-2 outline-none focus:bg-cyan-950/20">
        <button onclick="send()" class="holo-border px-4 py-2 hover:bg-cyan-900">SEND</button>
    </footer>

    <script>
        const feed = document.getElementById('feed');
        function send() {
            const input = document.getElementById('msg');
            if(!input.value) return;
            feed.innerHTML += `<div class="mb-2"><span class="text-pink-500">OLORIN:</span> ${input.value}</div>`;
            input.value = '';
            feed.scrollTop = feed.scrollHeight;
        }
    </script>
</body>
</html>
