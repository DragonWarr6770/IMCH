<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STABLE_STRIKE // V3_OLORIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Rye&display=swap');

        body { 
            background: #3d2b1f; /* Dark stable floor */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .coc-font { font-family: 'Luckiest Guy', cursive; text-shadow: 2px 2px 0 #000; }
        .western-font { font-family: 'Rye', cursive; }

        /* Stable Timber Panel */
        .stable-panel { 
            background: rgba(61, 43, 31, 0.92); 
            border: 6px solid #2a1b0f; 
            box-shadow: inset 0 0 20px #000, 4px 4px 0 #1a0f08;
            position: relative;
        }

        /* Hay Texture Overlay for Feed */
        .hay-feed {
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            background-color: rgba(255, 255, 255, 0.03);
        }

        /* Stable Door Buttons */
        .btn-stable {
            background: #8b4513;
            border: 3px solid #3d2b1f;
            border-bottom: 6px solid #2a1b0f;
            color: #ffd700;
            font-family: 'Luckiest Guy', cursive;
            transition: all 0.1s;
        }
        .btn-stable:active { border-bottom-width: 2px; transform: translateY(4px); }

        .btn-gold {
            background: linear-gradient(to bottom, #f1c40f, #d4ac0d);
            border: 3px solid #7d6608;
            border-bottom: 6px solid #4a3c05;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
            font-family: 'Luckiest Guy', cursive;
        }
        .btn-gold:active { border-bottom-width: 2px; transform: translateY(4px); }

        /* Parchment Chat Bubbles */
        .parchment {
            background: #f4e4bc;
            border: 2px solid #bda06d;
            border-radius: 4px;
            color: #4a3c05;
            padding: 10px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
            position: relative;
        }
        .parchment::before {
            content: '';
            position: absolute;
            left: -10px; top: 10px;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-right: 10px solid #bda06d;
        }
    </style>
</head>
<body class="p-2 md:p-6" id="main-body">

    <header class="flex justify-between items-center mb-4 p-3 stable-panel rounded-lg border-x-8">
        <div class="flex flex-col">
            <h1 class="coc-font text-3xl text-yellow-500 uppercase leading-none">Cavalry Chat</h1>
            <p class="western-font text-[10px] text-yellow-100/60 tracking-widest">OUTPOST_ALPHA_3036</p>
        </div>
        <div class="flex gap-2">
            <button onclick="copyInvite()" class="btn-stable px-4 py-2 text-xs rounded">INVITE CLAN</button>
            <button onclick="clearLog()" class="btn-stable px-4 py-2 text-xs rounded bg-red-900 border-red-950">BURN LOGS</button>
        </div>
    </header>

    <main id="feed" class="flex-1 overflow-y-auto stable-panel hay-feed p-6 space-y-6 mb-4 rounded-xl custom-scrollbar"></main>

    <footer class="stable-panel p-4 rounded-2xl bg-stone-800/50">
        <div class="flex gap-4 h-16">
            <label class="w-24 btn-stable flex flex-col items-center justify-center cursor-pointer rounded-xl group">
                <span class="text-[10px] leading-none uppercase">Mount<br>Background</span>
                <input type="file" id="img-up" class="hidden" accept="image/*">
            </label>
            
            <div class="flex-1">
                <input type="text" id="msg" placeholder="Command your riders..." 
                       class="w-full h-full bg-[#f4e4bc] border-4 border-[#bda06d] rounded-xl px-6 font-bold text-stone-800 placeholder-stone-500/50 outline-none focus:ring-4 ring-yellow-500/30">
            </div>
            
            <button onclick="sendBurst()" class="w-32 btn-gold text-2xl rounded-xl italic">CHARGE!</button>
        </div>
    </footer>

    <script>
        const pusher = new Pusher('3f9a95e2f8c70c6a4c0e', { cluster: 'ap2' });
        const channel = pusher.subscribe('my-channel');
        const feed = document.getElementById('feed');
        const body = document.getElementById('main-body');

        // --- THE HITCHING POST: LISTENER ---
        channel.bind('my-event', (data) => {
            if (data.isImage) {
                body.style.backgroundImage = `url('${data.content}')`;
                systemAlert(`${data.user} HAS RENOVATED THE STABLE`);
            } else {
                appendMessage(data.user, data.content);
            }
            feed.scrollTop = feed.scrollHeight;
        });

        function appendMessage(user, text) {
            const wrap = document.createElement('div');
            wrap.className = "flex flex-col items-start space-y-1 animate-in slide-in-from-left duration-300";
            wrap.innerHTML = `
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-yellow-500 rotate-45 border border-black"></div>
                    <span class="coc-font text-xs text-yellow-400 uppercase tracking-tighter">${user}</span>
                </div>
                <div class="parchment western-font text-sm font-bold">${text}</div>
            `;
            feed.appendChild(wrap);
        }

        function systemAlert(msg) {
            const div = document.createElement('div');
            div.className = "w-full text-center border-y border-yellow-900/50 py-1 text-[9px] coc-font text-yellow-600/80 tracking-widest";
            div.innerText = `>>> ${msg} <<<`;
            feed.appendChild(div);
        }

        async function sendBurst(customData = null) {
            const input = document.getElementById('msg');
            const payload = customData || {
                user: 'OLORIN',
                content: input.value,
                isImage: false
            };

            if (!payload.content) return;

            await fetch('/api/transmit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!customData) input.value = '';
        }

        function clearLog() { feed.innerHTML = ''; systemAlert("STABLE CLEANED"); }
        function copyInvite() {
            navigator.clipboard.writeText(window.location.href);
            alert("CLAN COORDINATES COPIED.");
        }

        document.getElementById('img-up').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => sendBurst({ user: 'OLORIN', content: ev.target.result, isImage: true });
            reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('msg').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendBurst(); });
    </script>
</body>
</html>
