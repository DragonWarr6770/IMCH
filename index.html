<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageChat | Real-Time Visual Messaging</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .chat-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        .message-in { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen flex overflow-hidden font-sans">

    <aside class="w-20 md:w-64 border-r border-slate-800 bg-slate-900/50 flex flex-col">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3">
            <div class="h-8 w-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-comments text-white"></i>
            </div>
            <h2 class="font-bold hidden md:block tracking-tight text-lg">ImageChat</h2>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2">
            <div class="bg-slate-800/50 p-3 rounded-xl flex items-center gap-3 cursor-pointer border border-indigo-500/30">
                <div class="h-10 w-10 rounded-full bg-indigo-500 flex items-center justify-center font-bold">G</div>
                <div class="hidden md:block">
                    <p class="text-sm font-semibold">General Gallery</p>
                    <p class="text-[10px] text-indigo-400">Online</p>
                </div>
            </div>
            </div>

        <div class="p-4 border-t border-slate-800">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-full bg-slate-700"></div>
                <div class="hidden md:block">
                    <p class="text-xs font-medium">Olorin</p>
                    <p class="text-[10px] text-slate-500">Settings</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative chat-gradient">
        
        <header class="h-16 border-b border-slate-800/50 flex items-center justify-between px-8 bg-slate-900/20 backdrop-blur-sm">
            <div class="flex items-center gap-4">
                <h3 class="font-medium text-slate-300"># general-gallery</h3>
                <span class="h-2 w-2 bg-green-500 rounded-full"></span>
            </div>
            <div class="flex gap-4 text-slate-400">
                <i class="fas fa-search cursor-pointer hover:text-white transition"></i>
                <i class="fas fa-users cursor-pointer hover:text-white transition"></i>
            </div>
        </header>

        <div id="chat-messages" class="flex-1 overflow-y-auto p-8 space-y-6 custom-scrollbar">
            <div class="flex justify-center">
                <span class="text-[10px] bg-slate-800 px-3 py-1 rounded-full text-slate-500 uppercase tracking-widest font-bold">Today</span>
            </div>

            <div class="flex gap-4 max-w-2xl message-in">
                <div class="h-10 w-10 rounded-full bg-amber-500 shrink-0"></div>
                <div class="space-y-2">
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold text-slate-100">Dev_Partner</span>
                        <span class="text-[10px] text-slate-500">12:45 PM</span>
                    </div>
                    <div class="bg-slate-800/80 p-4 rounded-2xl rounded-tl-none border border-slate-700/50">
                        <p class="text-sm leading-relaxed mb-3">Hey! Check out this UI mockup for the new dashboard.</p>
                        <div class="rounded-lg overflow-hidden border border-slate-600">
                            <img src="https://via.placeholder.com/600x300/1e293b/4f46e5?text=Image+Chat+Preview" alt="Shared visual" class="w-full">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="p-6">
            <div class="max-w-4xl mx-auto relative">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 flex gap-3 text-slate-500">
                    <label for="image-input" class="hover:text-indigo-400 cursor-pointer transition">
                        <i class="fas fa-plus-circle text-xl"></i>
                    </label>
                    <input type="file" id="image-input" class="hidden" accept="image/*">
                </div>
                
                <input type="text" 
                       placeholder="Message #general-gallery..." 
                       class="w-full bg-slate-800 border border-slate-700 rounded-2xl py-4 pl-14 pr-24 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition text-sm">
                
                <div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-4">
                    <i class="far fa-smile text-xl text-slate-500 hover:text-amber-400 cursor-pointer"></i>
                    <button class="text-indigo-500 font-bold text-sm hover:text-indigo-400 transition">SEND</button>
                </div>
            </div>
            <p class="text-[10px] text-center mt-3 text-slate-600">Press Enter to send. Supports PNG, JPG, and GIF.</p>
        </footer>
    </main>

    <script>
        // Auto-scroll to bottom on load
        const chatContainer = document.getElementById('chat-messages');
        chatContainer.scrollTop = chatContainer.scrollHeight;

        // Image Preview Handler
        const imgInput = document.getElementById('image-input');
        imgInput.addEventListener('change', function(e) {
            if(this.files && this.files[0]) {
                console.log("Image selected for upload: ", this.files[0].name);
                // In a full app, you would trigger a preview thumbnail here
            }
        });
    </script>
</body>
</html>
