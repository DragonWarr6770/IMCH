<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CLASH_OF_CHATS // VERCEL_EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        body { 
            background: #4b3621; /* Dark wood fallback */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.8s ease-in-out;
        }

        .coc-header { font-family: 'Luckiest Guy', cursive; text-shadow: 2px 2px 0 #000; color: #fff; }
        
        .stone-panel { 
            background: rgba(45, 45, 45, 0.85); 
            border: 4px solid #7a7a7a; 
            border-radius: 12px;
            box-shadow: inset 0 0 15px #000, 0 5px 15px rgba(0,0,0,0.5);
        }

        .chat-bubble {
            background: #fff;
            border-radius: 10px;
            color: #333;
            padding: 8px 12px;
            position: relative;
            border: 2px solid #ddd;
            max-width: 80%;
        }

        .btn-gold {
            background: linear-gradient(to bottom, #ffcc33 0%, #e6ac00 100%);
            border: 3px solid #664400;
            border-radius: 8px;
            color: #fff;
            text-shadow: 1px 1px 1px #000;
            font-family: 'Luckiest Guy', cursive;
            transition: transform 0.1s;
        }

        .btn-gold:active { transform: scale(0.95); }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e6ac00; border-radius: 4px; }
    </style>
</head>
<body class="p-2 md:p-4" id="main-body">

    <header class="flex justify-between items-center mb-2 px-4 py-2 bg-black/40 rounded-lg">
        <h1 class="coc-header text-2xl tracking-wide uppercase">Clash of Chats</h1>
        <div class="flex gap-2">
            <span class="text-xs bg-green-600 px-2 py-1 rounded border border-white text-white font-bold">OLORIN</span>
        </div>
    </header>

    <main id="feed" class="flex-1 overflow-y-auto stone-panel p-4 space-y-3 custom-scrollbar mb-4"></main>

    <footer class="stone-panel p-3 grid grid-cols-12 gap-2 bg-gray-800">
        <label class="col-span-3 btn-gold flex items-center justify-center cursor-pointer text-sm">
            SET BG
            <input type="file" id="img-up" class="hidden" accept="image/*">
        </label>
        
        <input type="text" id="msg" placeholder="Write a message..." 
               class="col-span-6 bg-white/10 border-2 border-gray-600 rounded-lg px-4 text-white outline-none focus:border-yellow-500">
        
        <button onclick="sendBurst()" class="col-span-3 btn-gold text-lg">ATTACK</button>
    </footer>

    <script>
        // --- RELAY CONFIG ---
        const pusher = new Pusher('3f9a95e2f8c70c6a4c0e', { cluster: 'ap2' });
        const channel = pusher.subscribe('my-channel');
        const feed = document.getElementById('feed');
        const body = document.getElementById('main-body');

        // --- GLOBAL SYNC: LISTENING ---
        channel.bind('my-event', (data) => {
            if (data.isImage) {
                // UPDATE BACKGROUND GLOBALLY
                body.style.backgroundImage = `url('${data.content}')`;
                const notice = document.createElement('div');
                notice.className = "text-center text-xs text-yellow-400 font-bold italic";
                notice.innerText = `[ SYSTEM: ${data.user} UPDATED THE WORLD MAP ]`;
                feed.appendChild(notice);
            } else {
                // RENDER CHAT BUBBLE
                const wrapper = document.createElement('div');
                wrapper.className = "flex flex-col items-start mb-2";
                
                const label = `<span class="text-[10px] font-bold text-yellow-500 ml-1 mb-1 uppercase">${data.user}</span>`;
                const bubble = `<div class="chat-bubble font-bold shadow-md">${data.content}</div>`;
                
                wrapper.innerHTML = label + bubble;
                feed.appendChild(wrapper);
            }
            feed.scrollTop = feed.scrollHeight;
        });

        // --- TRANSMIT LOGIC ---
        async function sendBurst(customData = null) {
            const msgInput = document.getElementById('msg');
            const payload = customData || {
                user: 'OLORIN',
                content: msgInput.value,
                isImage: false
            };

            if (!payload.content) return;

            // Hits your Vercel /api/transmit
            await fetch('/api/transmit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!customData) msgInput.value = '';
        }

        // --- IMAGE BACKGROUND HANDLER ---
        document.getElementById('img-up').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                sendBurst({ user: 'OLORIN', content: event.target.result, isImage: true });
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        // --- ENTER KEY ---
        document.getElementById('msg').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendBurst(); });
    </script>
</body>
</html>
