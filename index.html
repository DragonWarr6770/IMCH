<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CITADEL_CHAT // V4_FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=MedievalSharp&display=swap');

        body { 
            background: #1a0f08; 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'MedievalSharp', cursive;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: all 1s ease-in-out;
        }

        .coc-font { font-family: 'Luckiest Guy', cursive; text-shadow: 3px 3px 0 #000; }
        
        /* The Great Hall Panel */
        .citadel-panel { 
            background: linear-gradient(145deg, rgba(40, 30, 20, 0.95), rgba(20, 15, 10, 0.98));
            border: 4px solid #bda06d;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(189, 160, 109, 0.2);
            border-radius: 20px;
        }

        /* Message Bubbles - Royal Scroll Style */
        .scroll-msg {
            background: #fdf5e6;
            border-left: 8px solid #8b4513;
            border-right: 2px solid #bda06d;
            border-top: 1px solid #bda06d;
            border-bottom: 4px solid #bda06d;
            color: #2d1e12;
            padding: 12px 16px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.4);
            border-radius: 4px 15px 15px 4px;
        }

        /* Elite Gold Button */
        .btn-elite {
            background: linear-gradient(to bottom, #ffd700 0%, #b8860b 100%);
            border: 2px solid #5c3d00;
            border-bottom: 6px solid #453200;
            color: #fff;
            text-shadow: 1px 2px 2px #000;
            font-family: 'Luckiest Guy', cursive;
            letter-spacing: 1px;
        }
        .btn-elite:active { border-bottom-width: 2px; transform: translateY(4px); }

        /* Stable Wood Secondary Button */
        .btn-wood {
            background: #5d4037;
            border: 2px solid #3e2723;
            border-bottom: 5px solid #261b18;
            color: #d7ccc8;
            font-family: 'Luckiest Guy', cursive;
        }
        .btn-wood:active { border-bottom-width: 2px; transform: translateY(3px); }

        .custom-scroll::-webkit-scrollbar { width: 10px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scroll::-webkit-scrollbar-thumb { background: #bda06d; border-radius: 5px; border: 2px solid #1a0f08; }
    </style>
</head>
<body class="p-4 md:p-8" id="main-body">

    <header class="flex justify-between items-center mb-6 citadel-panel p-4">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-yellow-600 rounded-full border-4 border-white shadow-lg flex items-center justify-center coc-font text-xl text-white">O</div>
            <div>
                <h1 class="coc-font text-3xl text-yellow-500 uppercase tracking-wide">Citadel V4</h1>
                <div class="flex items-center gap-2">
                    <div class="h-2 w-32 bg-gray-800 rounded-full overflow-hidden border border-gray-600">
                        <div class="h-full bg-purple-600 w-3/4 animate-pulse"></div>
                    </div>
                    <span class="text-[10px] text-purple-400 font-bold uppercase">Elixir Active</span>
                </div>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="copyInvite()" class="btn-wood px-6 py-2 rounded-lg text-sm">RECRUIT</button>
            <button onclick="clearLog()" class="btn-wood px-6 py-2 rounded-lg text-sm hover:bg-red-900 transition-colors">PURGE</button>
        </div>
    </header>

    <main id="feed" class="flex-1 overflow-y-auto citadel-panel p-8 space-y-8 mb-6 custom-scroll"></main>

    <footer class="citadel-panel p-5">
        <div class="flex gap-4 items-center">
            <label class="w-28 btn-wood h-14 flex flex-col items-center justify-center cursor-pointer rounded-xl text-center group">
                <span class="text-[9px] uppercase leading-none">Change<br>Kingdom</span>
                <input type="file" id="img-up" class="hidden" accept="image/*">
            </label>
            
            <div class="flex-1 h-14 relative">
                <input type="text" id="msg" placeholder="Broadcast to the clan..." 
                       class="w-full h-full bg-[#2d1e12] border-2 border-[#bda06d] rounded-xl px-6 text-yellow-100 font-bold placeholder-yellow-800/50 outline-none focus:shadow-[0_0_15px_rgba(189,160,109,0.5)]">
            </div>
            
            <button onclick="sendBurst()" class="w-40 h-14 btn-elite text-2xl rounded-xl uppercase">Conquer</button>
        </div>
    </footer>

    <script>
        const pusher = new Pusher('3f9a95e2f8c70c6a4c0e', { cluster: 'ap2' });
        const channel = pusher.subscribe('my-channel');
        const feed = document.getElementById('feed');
        const body = document.getElementById('main-body');

        channel.bind('my-event', (data) => {
            if (data.isImage) {
                // Apply global background with a kingdom transition effect
                body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${data.content}')`;
                systemAlert(`${data.user} HAS CLAIMED A NEW TERRITORY`);
            } else {
                appendEntry(data.user, data.content);
            }
            feed.scrollTop = feed.scrollHeight;
        });

        function appendEntry(user, text) {
            const div = document.createElement('div');
            div.className = "flex flex-col items-start gap-1 max-w-[90%] transform transition-all hover:scale-[1.01]";
            div.innerHTML = `
                <div class="flex items-center gap-2 mb-1">
                    <span class="coc-font text-[10px] text-yellow-600 bg-black/40 px-2 py-0.5 rounded border border-yellow-900/50 uppercase">${user}</span>
                </div>
                <div class="scroll-msg font-bold tracking-tight">${text}</div>
            `;
            feed.appendChild(div);
        }

        function systemAlert(msg) {
            const div = document.createElement('div');
            div.className = "w-full text-center border-y-2 border-purple-900/30 py-2 text-[10px] coc-font text-purple-400 bg-purple-900/10 tracking-[0.2em]";
            div.innerText = msg;
            feed.appendChild(div);
        }

        async function sendBurst(customData = null) {
            const input = document.getElementById('msg');
            const payload = customData || {
                user: 'OLORIN',
                content: input.value,
                isImage: false
            };
            if (!payload.content) return;
            await fetch('/api/transmit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!customData) input.value = '';
        }

        function clearLog() { feed.innerHTML = ''; systemAlert("CITADEL RECORDS WIPED"); }
        function copyInvite() {
            navigator.clipboard.writeText(window.location.href);
            alert("CLAN INVITATION LINK COPIED TO SCROLL.");
        }

        document.getElementById('img-up').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => sendBurst({ user: 'OLORIN', content: ev.target.result, isImage: true });
            reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('msg').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendBurst(); });
    </script>
</body>
</html>
